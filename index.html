<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeelGut - Track Your Health</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input[type="datetime-local"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="datetime-local"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
            font-family: inherit;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 20px;
            font-size: 14px;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .entries {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .entry {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .entry:hover {
            transform: translateX(5px);
        }

        .entry.symptom {
            border-left-color: #f06292;
        }

        .entry.food {
            border-left-color: #4caf50;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .entry-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .entry-type.symptom {
            background: #f8bbd0;
            color: #c2185b;
        }

        .entry-type.food {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .entry-date {
            color: #666;
            font-size: 14px;
        }

        .entry-description {
            color: #333;
            line-height: 1.5;
        }

        .delete-btn {
            background: #f44336;
            padding: 6px 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .entry-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 FeelGut</h1>
        
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">Add New Entry</h2>
            <form id="entryForm">
                <div class="form-group">
                    <label for="dateTime">Date & Time</label>
                    <input type="datetime-local" id="dateTime" required>
                </div>
                
                <div class="form-group">
                    <label for="entryType">Type</label>
                    <select id="entryType" required>
                        <option value="">Select type...</option>
                        <option value="food">Food</option>
                        <option value="symptom">Symptom</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Describe what you ate or the symptoms you experienced..." required></textarea>
                </div>
                
                <button type="submit">Add Entry</button>
            </form>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">Your Entries</h2>
            
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="food">Food</button>
                <button class="filter-btn" data-filter="symptom">Symptoms</button>
            </div>
            
            <div id="entriesList" class="entries">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    <p>No entries yet. Start tracking your health!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize the app
        let entries = [];
        let currentFilter = 'all';

        // Load entries from localStorage on page load
        function loadEntries() {
            const stored = localStorage.getItem('feelgut_entries');
            if (stored) {
                entries = JSON.parse(stored);
            }
            displayEntries();
        }

        // Save entries to localStorage
        function saveEntries() {
            localStorage.setItem('feelgut_entries', JSON.stringify(entries));
        }

        // Format date for display
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }

        // Display entries
        function displayEntries() {
            const container = document.getElementById('entriesList');
            
            // Filter entries
            let filteredEntries = entries;
            if (currentFilter !== 'all') {
                filteredEntries = entries.filter(entry => entry.type === currentFilter);
            }

            // Sort by date (newest first)
            filteredEntries.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));

            if (filteredEntries.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                        <p>No ${currentFilter === 'all' ? '' : currentFilter} entries yet.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredEntries.map((entry, index) => `
                <div class="entry ${entry.type}">
                    <div class="entry-header">
                        <div>
                            <span class="entry-type ${entry.type}">${entry.type}</span>
                            <span class="entry-date">${formatDate(entry.dateTime)}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteEntry(${entry.id})">Delete</button>
                    </div>
                    <div class="entry-description">${entry.description}</div>
                </div>
            `).join('');
        }

        // Add new entry
        document.getElementById('entryForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const dateTime = document.getElementById('dateTime').value;
            const type = document.getElementById('entryType').value;
            const description = document.getElementById('description').value;

            const newEntry = {
                id: Date.now(),
                dateTime: dateTime,
                type: type,
                description: description
            };

            entries.push(newEntry);
            saveEntries();
            displayEntries();

            // Reset form
            this.reset();
            
            // Show success message (optional)
            alert('Entry added successfully!');
        });

        // Delete entry
        function deleteEntry(id) {
            if (confirm('Are you sure you want to delete this entry?')) {
                entries = entries.filter(entry => entry.id !== id);
                saveEntries();
                displayEntries();
            }
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Update active state
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // Update filter and display
                currentFilter = this.dataset.filter;
                displayEntries();
            });
        });

        // Set default date/time to now
        function setDefaultDateTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('dateTime').value = now.toISOString().slice(0, 16);
        }

        // Initialize app
        setDefaultDateTime();
        loadEntries();
    </script>
</body>
</html>
